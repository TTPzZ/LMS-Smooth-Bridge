name: lms_smooth_bridge_mobile
description: Basic Flutter frontend for LMS Smooth Bridge backend
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_local_notifications: ^17.2.3
  google_fonts: ^6.2.1
  http: ^1.2.2
  intl: ^0.20.2
  rename_app: ^1.6.5
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/ddaa.png"
